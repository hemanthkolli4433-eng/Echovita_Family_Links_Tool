name: Echovita Family Links Scraper

on:
  schedule:
    - cron: '0 2 * * *'

  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Google Chrome and Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb
          google-chrome --version
          which google-chrome
          rm -rf ~/.local/share/undetected_chromedriver
          rm -rf ~/.cache/selenium

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install undetected-chromedriver selenium openpyxl pandas xlsxwriter tqdm
          fi

      - name: Remove old output files
        run: |
          rm -f Echovita_Family_Links_Tool_Output_*.xlsx
          rm -f Combined_Excel.xlsx

      - name: Run Echovita scraper
        run: |
          xvfb-run -a python Echovita_Family_Links_Tool_V1.py

      - name: Run combine tool using scraper output
        if: always()
        run: |
          shopt -s nullglob
          files=(Echovita_Family_Links_Tool_Output_*.xlsx)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No scraper output Excel found."
            ls -la
            exit 0
          fi

          echo "Found scraper output files:"
          printf '%s\n' "${files[@]}"

          python Combine_Excel_Tool.py "${files[@]}"

      - name: Upload output files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: echovita-output
          path: |
            Echovita_Family_Links_Tool_Output_*.xlsx
            Combined_Excel.xlsx
          retention-days: 30
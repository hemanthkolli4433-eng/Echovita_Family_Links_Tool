name: Run Echovita Tool Every 6 Hours

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run-tool:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Echovita Python tool
        run: |
          python Echovita_Family_Links_Tool_NoPopup_SameFolder.py

      - name: Upload output Excel
        uses: actions/upload-artifact@v4
        with:
          name: Echovita_Output
          path: Echovita_Family_Links_Tool_Output.xlsx
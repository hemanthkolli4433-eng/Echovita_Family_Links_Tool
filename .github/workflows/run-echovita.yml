name: Run Echovita Tool Every 6 Hours

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run-tool:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google Chrome and Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb
          google-chrome --version
          which google-chrome
          rm -rf ~/.local/share/undetected_chromedriver
          rm -rf ~/.cache/selenium

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install undetected-chromedriver selenium openpyxl
          fi

      - name: Check installed versions
        run: |
          python --version
          google-chrome --version
          which google-chrome

      - name: Run Echovita Python tool
        run: |
          xvfb-run -a python Echovita_Family_Links_Tool_NoPopup_SameFolder.py

      - name: Upload output Excel
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Echovita_Output
          path: Echovita_Family_Links_Tool_Output.xlsx
          retention-days: 7
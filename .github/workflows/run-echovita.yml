name: Run Echovita Tool Every 6 Hours

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run-tool:
    runs-on: windows-latest
    timeout-minutes: 30 # 🌟 Safeguard: Stops the workflow if it gets stuck for more than 30 mins

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Echovita Python tool
        shell: powershell
        run: |
          python Echovita_Family_Links_Tool_NoPopup_SameFolder.py 2>&1 | Select-String -Pattern "google_apis\\gcm" -NotMatch

      - name: Upload output Excel
        if: always() # 🌟 Ensures the partial Excel sheet is uploaded even if the script errors out halfway!
        uses: actions/upload-artifact@v4
        with:
          name: Echovita_Output
          path: Echovita_Family_Links_Tool_Output.xlsx